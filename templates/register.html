{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-8">
        <h1 class="text-2xl font-semibold mb-6">Create Account</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-4 px-4 py-3 rounded-xl 
                        {% if category == 'error' %}bg-red-500/10 border border-red-500 text-red-400
                        {% else %}bg-green-500/10 border border-green-500 text-green-400{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/register" class="space-y-5">
            <div>
                <label class="block text-sm mb-1.5">Username</label>
                <input type="text" name="username" required
                       class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-2.5 focus:outline-none focus:border-zinc-500">
            </div>

            <div>
                <label class="block text-sm mb-1.5">Password</label>
                <input type="password" name="password" required
                       class="w-full bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-2.5 focus:outline-none focus:border-zinc-500">
            </div>

            <button type="submit"
                    class="w-full bg-white text-black font-medium py-2.5 rounded-xl hover:bg-zinc-200 transition">
                Register
            </button>
        </form>

        <p class="text-center text-sm text-zinc-400 mt-6">
            Already have an account? 
            <a href="/login" class="text-white hover:underline">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
